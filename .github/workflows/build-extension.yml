name: Build Extension

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'epoint-gpt-autoreg-extension/**'
      - 'protection/scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: protection
        run: npm ci || npm install

      - name: Build protected extension
        working-directory: protection
        run: npm run build

      - name: Create ZIP
        run: |
          cd protection/dist/extension-protected
          zip -r ../../../public/epoint-gpt-autoreg-extension.zip .

      - name: Commit ZIP to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/epoint-gpt-autoreg-extension.zip
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-build protected extension [skip ci]"
            git push
          fi
